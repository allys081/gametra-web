{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0">Mi Perfil de Usuario</h4>
            </div>
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="bg-light d-inline-block rounded-circle p-4 mb-2">
                        <span class="display-4">👤</span>
                    </div>
                    <h3>{{ user.username }}</h3>
                    <p class="text-muted">{{ user.email }}</p>
                </div>

                <hr>

                <div class="mt-4">
                    <h5>Mis Actividades</h5>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Juegos publicados
                            <li class="list-group-item d-flex justify-content-between align-items-center">
    Juegos publicados
    <span class="badge bg-primary rounded-pill">{{ juegos_count }}</span>
</li>
<li class="list-group-item d-flex justify-content-between align-items-center">
    Reseñas escritas
    <span class="badge bg-primary rounded-pill">{{ resenas_count }}</span>
</li>

                        </li>
                    </ul>
                </div>

                <div class="mt-4 d-grid">
                    <a href="/" class="btn btn-outline-secondary">Volver al Inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
