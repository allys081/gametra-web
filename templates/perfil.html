{% extends 'base.html' %}
{% block content %}

<style>
    .profile-card {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(111,66,193,0.12);
        max-width: 560px;
        margin: 0 auto;
    }

    .profile-header {
        background: linear-gradient(135deg, #6f42c1, #4a90d9);
        padding: 40px 30px 60px;
        text-align: center;
        position: relative;
    }

    .profile-avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(255,255,255,0.25);
        border: 4px solid rgba(255,255,255,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 14px;
        backdrop-filter: blur(4px);
    }

    .profile-username {
        color: white;
        font-size: 1.6rem;
        font-weight: 800;
        margin-bottom: 4px;
    }

    .profile-email {
        color: rgba(255,255,255,0.75);
        font-size: 0.88rem;
    }

    .profile-body {
        padding: 30px;
        margin-top: -1px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 28px;
    }

    .stat-card {
        background: #f8f5ff;
        border: 1.5px solid #e0d9f5;
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(111,66,193,0.12);
    }

    .stat-icon {
        font-size: 1.8rem;
        margin-bottom: 8px;
        display: block;
    }

    .stat-number {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6f42c1, #4a90d9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 4px;
    }

    .stat-label {
        font-size: 0.78rem;
        color: #999;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .btn-back {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px;
        border-radius: 50px;
        border: 2px solid #e0d9f5;
        color: #6f42c1;
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.2s;
        background: white;
    }
    .btn-back:hover {
        background: #6f42c1;
        color: white;
        border-color: #6f42c1;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="profile-card">

            <!-- Header con gradiente -->
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <div class="profile-username">{{ user.username }}</div>
                {% if user.email %}
                <div class="profile-email">{{ user.email }}</div>
                {% endif %}
            </div>

            <!-- Body -->
            <div class="profile-body">

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-icon">🎮</span>
                        <div class="stat-number">{{ juegos_count }}</div>
                        <div class="stat-label">Juegos publicados</div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">💬</span>
                        <div class="stat-number">{{ resenas_count }}</div>
                        <div class="stat-label">Reseñas escritas</div>
                    </div>
                </div>

                <a href="/" class="btn-back">← Volver al Inicio</a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
