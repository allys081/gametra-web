{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0" style="border-radius: 16px; overflow: hidden;">
            <div class="card-header text-white text-center py-4"
                 style="background: linear-gradient(135deg, #6f42c1, #4a90d9);">
                <h4 class="mb-0 fw-bold">Iniciar Sesión</h4>
                <small style="opacity: 0.85;">Bienvenido de nuevo</small>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="mb-3 p-3" style="background:#fff3f3; border-left: 4px solid #dc3545; border-radius: 8px; font-size: 0.88rem; color: #dc3545;">
                        ⚠️ Usuario o contraseña incorrectos. Intenta de nuevo.
                    </div>
                    {% endif %}

                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-semibold" style="font-size: 0.9rem; color: #444;">
                            Nombre de usuario
                        </label>
                        <input type="text" name="username" id="id_username" required placeholder="Tu usuario">
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold" style="font-size: 0.9rem; color: #444;">
                            Contraseña
                        </label>
                        <div class="password-wrapper">
                            <input type="password" name="password" id="id_password" required placeholder="Tu contraseña">
                            <button type="button" class="toggle-password" tabindex="-1">👁</button>
                        </div>
                    </div>

                    <div class="d-grid mt-2">
                        <button type="submit" class="btn fw-bold py-2"
                                style="background: linear-gradient(135deg, #6f42c1, #4a90d9); color: white; border-radius: 10px; font-size: 1rem;">
                            Entrar a Gametra
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-white border-0">
                <p class="mb-0 text-muted small">
                    ¿No tienes cuenta?
                    <a href="{% url 'registro' %}" class="fw-bold text-decoration-none" style="color: #6f42c1;">
                        Regístrate aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    input {
        display: block;
        width: 100%;
        padding: 0.55rem 0.85rem;
        border: 1.5px solid #ddd;
        border-radius: 10px;
        font-size: 0.95rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
        box-sizing: border-box;
    }
    input:focus {
        border-color: #6f42c1;
        box-shadow: 0 0 0 3px rgba(111, 66, 193, 0.12);
    }
    .password-wrapper {
        position: relative;
    }
    .password-wrapper input {
        padding-right: 2.8rem;
    }
    .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        color: #888;
        padding: 0;
        line-height: 1;
    }
    .toggle-password:hover { color: #6f42c1; }
</style>

<script>
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function () {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.textContent = '🔒';
            } else {
                input.type = 'password';
                this.textContent = '👁';
            }
        });
    });
</script>
{% endblock %}
