{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-primary border-bottom pb-2 mb-4">Publicar Nuevo Juego</h2>
        
        <form method="post" class="card p-4 shadow border-0">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Título del Juego</label>
                <input type="text" name="titulo" class="form-control" placeholder="Ej: Elden Ring" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" placeholder="Cuéntanos de qué trata..."></textarea>
            </div>
            
            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" name="es_publico" id="flexSwitchCheckDefault" checked>
                <label class="form-check-label" for="flexSwitchCheckDefault">Hacer este juego público (lo verán todos)</label>
                <div class="form-text">Si lo desactivas, solo será visible para usuarios registrados.</div>
            </div>
            
            <div class="d-grid">
                <button type="submit" class="btn btn-primary fw-bold">Guardar Juego en Catálogo</button>
                <a href="{% url 'juegos' %}" class="btn btn-link text-muted mt-2">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
