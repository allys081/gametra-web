{% extends 'base.html' %}
{% block content %}

<style>
    .confirm-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(220,53,69,0.12);
        max-width: 480px;
        margin: 40px auto;
    }
    .confirm-header {
        background: linear-gradient(135deg, #dc3545, #ff6b6b);
        padding: 30px;
        text-align: center;
        color: white;
    }
    .confirm-icon {
        font-size: 3rem;
        display: block;
        margin-bottom: 10px;
    }
    .confirm-title {
        font-size: 1.4rem;
        font-weight: 800;
        margin: 0;
    }
    .confirm-body {
        padding: 30px;
        text-align: center;
    }
    .confirm-text {
        color: #555;
        font-size: 0.95rem;
        margin-bottom: 8px;
    }
    .confirm-objeto {
        background: #fff5f5;
        border: 1.5px solid #ffcdd2;
        border-radius: 10px;
        padding: 12px 16px;
        color: #c62828;
        font-size: 0.9rem;
        font-weight: 600;
        margin: 16px 0 24px;
    }
    .confirm-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
    }
    .btn-confirmar {
        background: linear-gradient(135deg, #dc3545, #ff6b6b);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 10px 28px;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn-confirmar:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-cancelar {
        background: transparent;
        color: #6f42c1;
        border: 2px solid #6f42c1;
        border-radius: 50px;
        padding: 10px 28px;
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.2s;
        display: inline-block;
    }
    .btn-cancelar:hover { background: #6f42c1; color: white; }
</style>

<div class="confirm-card">
    <div class="confirm-header">
        <span class="confirm-icon">⚠️</span>
        <h4 class="confirm-title">¿Eliminar {{ tipo }}?</h4>
    </div>
    <div class="confirm-body">
        <p class="confirm-text">Estás a punto de eliminar este {{ tipo }}:</p>
        <div class="confirm-objeto">{{ objeto }}</div>
        <p class="confirm-text" style="color:#e53935; font-weight:600;">
            Esta acción no se puede deshacer.
        </p>
        <div class="confirm-actions">
            <a href="{{ cancel_url }}" class="btn-cancelar">Cancelar</a>
            <form method="POST" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn-confirmar">Sí, eliminar</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
