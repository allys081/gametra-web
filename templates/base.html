<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gametra Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6f42c1; /* Morado Gametra */
            --bg-color: #f8f9fa;
        }
        body { background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--primary-color) !important; padding: 1rem; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .nav-link { color: rgba(255,255,255,0.9) !important; margin-right: 15px; }
        .nav-link:hover { color: #fff !important; }
        .main-container { margin-top: 30px; min-height: 80vh; }
        .footer { background: #333; color: white; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">GAMETRA 🎮</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/juegos/">Juegos</a></li>
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="/perfil/">Mi Perfil</a></li>
                        <li class="nav-item">
                            <form action="{% url 'logout' %}" method="post" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm mt-1">Salir</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="btn btn-warning btn-sm mt-1" href="/login/">Iniciar Sesión</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-container">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer text-center">
        <p>&copy; 2026 Gametra Web Project - Inacap</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
